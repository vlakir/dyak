# Пример dyak.yaml — ОПЦИОНАЛЬНЫЙ конфиг (T006).
#
# Для типичной таблицы со стандартными заголовками (Фамилия / Имя /
# Отчество / Должность) конфиг НЕ НУЖЕН вовсе — пример запускается без
# `--config` (см. README.md рядом). Этот файл показывает, что можно
# настроить, если заголовки нестандартные или нужны ручные правки.

# aliases — привязать нестандартный заголовок колонки к роли
# (surname / name / patronymic / position), чтобы dyak распознал
# склоняемую колонку (склонение — в T002).
# aliases:
#   "Сотрудник": surname
#   "Подразделение": position

# overrides — ручные формы склонения (потребляются в T002–T003).
# overrides:
#   fio: {}
#   position: {}
