# Пример dyak.yaml — ОПЦИОНАЛЬНЫЙ конфиг (T006).
#
# Для типичной таблицы со стандартными заголовками (Фамилия / Имя /
# Отчество / Должность) конфиг НЕ НУЖЕН вовсе — пример запускается без
# `--config` (см. README.md рядом). Этот файл показывает, что можно
# настроить, если заголовки нестандартные или нужны ручные правки.

# aliases — привязать нестандартный заголовок колонки к роли
# (surname / name / patronymic / position), чтобы dyak распознал
# склоняемую колонку.
# aliases:
#   "Сотрудник": surname
#   "Подразделение": position

# genders — ручное указание пола для неоднозначных имён (T002).
# Ключ — ФИО как в таблице; значение — м/ж (муж/жен/male/female).
# Нужно, только если пол не определяется по отчеству/имени (напр. «Саша»).
# genders:
#   "Ким Саша": ж

# decline_surnames — фамилии, которые НАДО склонять (T027). По умолчанию
# фамилии-нарицательные (Бивень, Кузнец, Заяц — pymorphy не знает их как
# фамилии) остаются в ИМЕНИТЕЛЬНОМ, как в официальных документах. Если в
# вашем случае такую фамилию надо склонять — перечислите её здесь.
# decline_surnames:
#   - Бивень
#   - Кузнец

# overrides — ручные формы склонения (T003).
# Должности (position): для фраз, которые пословный движок берёт неидеально
# (несогласованные обороты), задаём формы вручную — они имеют приоритет.
# Ключ — должность как в таблице; можно указать не все падежи (остальные
# возьмёт движок). Сокращения падежей: им/рд/дт/вн/тв/пр.
# overrides:
#   position:
#     "заместитель генерального директора":
#       рд: "заместителя генерального директора"
#       дт: "заместителю генерального директора"
#       вн: "заместителя генерального директора"
#       тв: "заместителем генерального директора"
#       пр: "заместителе генерального директора"
