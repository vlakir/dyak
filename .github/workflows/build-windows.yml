name: build-windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  win-build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - name: Compute VERSION
        shell: bash
        run: |
          # Тег vX.Y.Z → X.Y.Z; ручной прогон без тега → dev-версия.
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "Building version: ${VERSION}"

      - name: Install dependencies (with build group)
        run: uv sync --group build

      - name: Build bundles (onedir + onefile)
        run: uv run pyinstaller packaging/dyak.spec --noconfirm --clean

      - name: Assert PyInstaller output exists
        shell: pwsh
        run: |
          # onedir (для инсталлятора) + onefile (portable single-exe)
          if (-not (Test-Path 'dist/dyak/dyak.exe')) {
            Write-Error 'onedir dist/dyak/dyak.exe not found'
            Get-ChildItem dist -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
            exit 1
          }
          if (-not (Test-Path 'dist/dyak-portable.exe')) {
            Write-Error 'onefile dist/dyak-portable.exe not found'
            Get-ChildItem dist -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
            exit 1
          }
          Write-Host 'OK: dist/dyak/dyak.exe, dist/dyak-portable.exe'

      - name: Smoke — собранный exe корректно склоняет (T021)
        shell: pwsh
        run: |
          # Retrospective 0.3.0: CI проверял лишь факт создания файлов, не их
          # содержимое — так баг T021 (petrovich в cp1251 не склонял фамилию на
          # русской Windows) ушёл в релиз. Здесь собранный (frozen) exe реально
          # генерирует из фикстуры, а чек ассертит дательный падеж в документе.
          uv run python tests/win_smoke.py make _smoke
          New-Item -ItemType Directory -Force -Path _smoke/out | Out-Null
          # Windowed-exe (console=False) НЕ блокирует шелл (`& exe` возвращается
          # сразу) и без консоли пишет в невалидный stdout. Запускаем через
          # Start-Process -Wait с явным редиректом потоков в файлы — так шелл
          # ждёт завершения, а у ядра валидные дескрипторы потоков.
          $p = Start-Process -FilePath 'dist/dyak-portable.exe' `
            -ArgumentList 'generate','--table','_smoke/table.xlsx','--template','_smoke/template.docx','--out','_smoke/out' `
            -Wait -PassThru -NoNewWindow `
            -RedirectStandardOutput _smoke/out.log -RedirectStandardError _smoke/err.log
          Write-Host "exe exit code: $($p.ExitCode)"
          Get-Content _smoke/out.log, _smoke/err.log -ErrorAction SilentlyContinue
          uv run python tests/win_smoke.py check _smoke/out
          if ($LASTEXITCODE -ne 0) { Write-Error 'Windows smoke: склонение неверно — см. лог выше'; exit 1 }

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer (Inno Setup)
        shell: cmd
        run: iscc packaging\installer.iss
        env:
          VERSION: ${{ env.VERSION }}

      - name: Stage portable exe
        shell: pwsh
        run: |
          # Portable — единый exe, без папок/архива. Просто кладём в корень.
          Copy-Item "dist/dyak-portable.exe" "dyak-$env:VERSION-portable.exe" -Force
          Write-Host "Created dyak-$env:VERSION-portable.exe"

      - name: Assert both artifacts exist
        shell: pwsh
        run: |
          # Сборка может пройти «зелёной», но артефакт молча не туда лечь
          # (так setup.exe из packaging/ не попадал в upload). Падаем громко.
          $setup = Get-ChildItem -Filter 'dyak-*-setup.exe' -ErrorAction SilentlyContinue
          $portable = Get-ChildItem -Filter 'dyak-*-portable.exe' -ErrorAction SilentlyContinue
          if (-not $setup) { Write-Error 'dyak-*-setup.exe не найден в корне'; exit 1 }
          if (-not $portable) { Write-Error 'dyak-*-portable.exe не найден в корне'; exit 1 }
          Write-Host "OK: $($setup.Name), $($portable.Name)"

      # Два отдельных артефакта (не один общий) — версии лежат раздельно.
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: dyak-setup
          path: dyak-*-setup.exe

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: dyak-portable
          path: dyak-*-portable.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dyak-*-setup.exe
            dyak-*-portable.exe
