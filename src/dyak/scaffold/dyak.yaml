# dyak.yaml — ОПЦИОНАЛЬНЫЙ конфиг.
#
# Для типичной таблицы со стандартными заголовками (Фамилия / Имя /
# Отчество / Должность) конфиг НЕ НУЖЕН вовсе — generate запускается без
# --config. Этот файл показывает, что можно настроить, если заголовки
# нестандартные или нужны ручные правки. Всё ниже закомментировано —
# раскомментируйте нужное.

# aliases — привязать нестандартный заголовок колонки к роли
# (surname / name / patronymic / position / fullname), чтобы dyak распознал
# склоняемую колонку. fullname — одна колонка «ФИО», разбираемая на части.
# aliases:
#   "Сотрудник": surname
#   "Подразделение": position

# genders — ручное указание пола для неоднозначных имён.
# Ключ — ФИО как в таблице; значение — м/ж (муж/жен/male/female).
# Нужно, только если пол не определяется по отчеству/имени (напр. «Саша»).
# genders:
#   "Ким Саша": ж

# decline_surnames — фамилии, которые НАДО склонять. По умолчанию фамилии-
# нарицательные (Бивень, Кузнец — pymorphy не знает их как фамилии) остаются
# в ИМЕНИТЕЛЬНОМ, как в официальных документах. Перечислите здесь те, что
# всё-таки склонять.
# decline_surnames:
#   - Бивень

# overrides — ручные формы склонения (две секции: fio и position).
# Сокращения падежей везде: им/рд/дт/вн/тв/пр; можно указать не все
# (остальные возьмёт движок). Ручные формы имеют приоритет над движком.
#
# ФИО (fio): зафиксировать формы для конкретного человека, если автодвижок
# склоняет его фамилию/имя неудачно (редкие/иностранные имена). Ключ — ФИО
# как в таблице.
# overrides:
#   fio:
#     "Иванов Пётр Семёнович":
#       рд: "Иванова Петра Семёновича"
#       дт: "Иванову Петру Семёновичу"
#
# Должности (position): для фраз, которые пословный движок берёт неидеально
# (несогласованные обороты). Ключ — должность как в таблице.
# overrides:
#   position:
#     "заместитель генерального директора":
#       рд: "заместителя генерального директора"
#       дт: "заместителю генерального директора"
#       вн: "заместителя генерального директора"
#       тв: "заместителем генерального директора"
#       пр: "заместителе генерального директора"
