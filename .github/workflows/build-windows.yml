name: build-windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  win-build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - name: Compute VERSION
        shell: bash
        run: |
          # Тег vX.Y.Z → X.Y.Z; ручной прогон без тега → dev-версия.
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "Building version: ${VERSION}"

      - name: Install dependencies (with build group)
        run: uv sync --group build

      - name: Build onedir bundle (PyInstaller)
        run: uv run pyinstaller packaging/dyak.spec --noconfirm --clean

      - name: Assert PyInstaller output exists
        shell: pwsh
        run: |
          if (-not (Test-Path 'dist/dyak/dyak.exe')) {
            Write-Error 'PyInstaller output dist/dyak/dyak.exe not found'
            Get-ChildItem dist -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
            exit 1
          }
          Write-Host 'OK: dist/dyak/dyak.exe'

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer (Inno Setup)
        shell: cmd
        run: iscc packaging\installer.iss
        env:
          VERSION: ${{ env.VERSION }}

      - name: Build portable zip
        shell: pwsh
        run: |
          $portable = "dyak_portable_package"
          New-Item -ItemType Directory -Force -Path $portable | Out-Null
          Copy-Item -Path "dist/dyak/*" -Destination $portable -Recurse -Force
          Copy-Item -Path "packaging/portable_README.txt" -Destination "$portable/README.txt" -Force
          $zip = "dyak-$env:VERSION-portable.zip"
          Compress-Archive -Path "$portable/*" -DestinationPath $zip -Force
          Write-Host "Created $zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dyak-windows
          path: |
            dyak-*-setup.exe
            dyak-*-portable.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dyak-*-setup.exe
            dyak-*-portable.zip
