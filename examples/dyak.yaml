# Пример конфигурации dyak (этап 0 — простая подстановка, без склонения).
# Маппинг: доменное поле → заголовок колонки в employees.xlsx.

columns:
  surname: "Фамилия"
  name: "Имя"
  patronymic: "Отчество"
  position: "Должность"
  gender: "Пол"          # обязательная (используется со склонением в T002)
  # дополнительные колонки доступны в шаблоне по русскому имени-ключу:
  дата_начала: "Дата начала"
  дата_приказа: "Дата приказа"
  номер_приказа: "Номер приказа"

# распознавание значений пола (пригодится в T002)
gender_values:
  male:   ["м", "муж", "мужской"]
  female: ["ж", "жен", "женский"]

# шаблон имени выходного файла (тот же Jinja-движок, русские теги)
filename: "Приказ_{{ номер_приказа }}_{{ сотрудник.фамилия }}.docx"

overrides:
  fio: {}
  position: {}
